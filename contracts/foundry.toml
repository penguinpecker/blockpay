[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read", path = "./"}]

[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 1_000, depth = 50 }

[rpc_endpoints]
arc_testnet     = "${ARC_TESTNET_RPC_URL}"
base_sepolia    = "${BASE_SEPOLIA_RPC_URL}"
eth_sepolia     = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
eth_sepolia  = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
